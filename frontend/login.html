<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>RedOne Creative — Đăng nhập</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg-0: #0f1118;
    --bg-1: #161821;
    --bg-2: #1c1f2b;
    --border: rgba(255, 255, 255, 0.08);
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --brand: #ef4444;
    --brand-dim: #dc2626;
    --red-soft: rgba(239, 68, 68, 0.1);
  }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background: var(--bg-0);
    color: var(--text);
    font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .card {
    width: 420px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 32px 32px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(255, 255, 255, 0.04) inset;
  }
  .logo {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--brand), #b91c1c);
    border-radius: 14px;
    display: grid; place-items: center;
    margin: 0 auto 18px;
    font-size: 30px; font-weight: 800; color: white;
    box-shadow: 0 6px 20px rgba(239, 68, 68, 0.3);
  }
  h1 {
    margin: 0;
    text-align: center;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .subtitle {
    margin: 6px 0 28px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }
  .info {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 12.5px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 22px;
  }
  .info b { color: var(--text); }
  .login-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 13px;
    background: white;
    color: #1f2937;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, transform 0.1s;
  }
  .login-btn:hover { background: #f3f4f6; }
  .login-btn:active { transform: scale(0.98); }
  .login-btn svg { flex-shrink: 0; }
  .error {
    margin-top: 18px;
    padding: 12px 14px;
    background: var(--red-soft);
    border: 1px solid rgba(239, 68, 68, 0.3);
    border-radius: 8px;
    font-size: 12.5px;
    line-height: 1.5;
    color: #fca5a5;
    display: none;
  }
  .error.visible { display: block; }
  .footer {
    margin-top: 28px;
    text-align: center;
    font-size: 11px;
    color: rgba(148, 163, 184, 0.5);
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">R</div>
  <h1>RedOne Creative</h1>
  <p class="subtitle">Internal tool — đăng nhập bằng email công ty</p>

  <div class="info">
    Chỉ tài khoản <b id="domain-display">@redone.vn</b> được phép sử dụng.<br>
    Login 1 lần / 30 ngày, lưu trên máy này.
  </div>

  <a class="login-btn" href="/auth/login" id="login-link">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285f4" d="M22.5 12.27c0-.79-.07-1.54-.2-2.27H12v4.51h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.32z"/><path fill="#34a853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#fbbc04" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#ea4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Sign in with Google
  </a>

  <div class="error" id="error-box"></div>

  <div class="footer">
    RedOne Creative © Internal Build
  </div>
</div>

<script>
  // Display the actual allowed domain (from backend config) so the
  // message stays right if admin ever changes redone.vn → something else.
  fetch("/auth/me")
    .then(r => r.json())
    .then(data => {
      if (data && data.allowed_domain) {
        document.getElementById("domain-display").textContent =
          "@" + data.allowed_domain;
      }
      // If somehow we hit /login.html while already logged in
      // (e.g. user typed URL manually), bounce back to home.
      if (data && data.logged_in) {
        window.location.replace("/");
      }
      // If OAuth not configured at all, show a clear admin message.
      if (data && data.oauth_configured === false) {
        const errBox = document.getElementById("error-box");
        errBox.innerHTML =
          "<b>OAuth chưa cấu hình.</b><br>" +
          "Admin: copy <code>backend/private_config.py.template</code> → " +
          "<code>backend/private_config.py</code> và điền OAUTH_CLIENT_ID + " +
          "OAUTH_CLIENT_SECRET, rồi restart tool.";
        errBox.classList.add("visible");
        document.getElementById("login-link").style.pointerEvents = "none";
        document.getElementById("login-link").style.opacity = "0.5";
      }
    })
    .catch(() => { /* offline / boot error — keep static UI */ });

  // Parse ?error=... + ?email=... from URL (set by /auth/callback on
  // failure) and show a friendly message.
  const params = new URLSearchParams(location.search);
  const errCode = params.get("error");
  const email = params.get("email");
  if (errCode) {
    const map = {
      "domain":
        email
          ? `Tài khoản <b>${email}</b> không phải email công ty.<br>` +
            `Chỉ <b id="d2">@redone.vn</b> được phép.`
          : `Email không phải domain công ty. Chỉ <b id="d2">@redone.vn</b> được phép.`,
      "bad_state":
        "Session không hợp lệ (có thể bạn đợi quá lâu). Bấm Sign in lại.",
      "no_code":
        "Google không trả về mã xác thực. Thử lại.",
      "access_denied":
        "Bạn đã hủy đăng nhập ở màn hình Google.",
      "exchange_failed":
        "Lỗi đổi mã với Google. Kiểm tra cấu hình OAuth Client + Redirect URI.",
    };
    const msg = map[errCode] || `Lỗi: ${errCode}`;
    const errBox = document.getElementById("error-box");
    errBox.innerHTML = msg;
    errBox.classList.add("visible");
    // Patch the domain placeholder in the error too
    fetch("/auth/me")
      .then(r => r.json())
      .then(data => {
        if (data && data.allowed_domain) {
          const d2 = document.getElementById("d2");
          if (d2) d2.textContent = "@" + data.allowed_domain;
        }
      })
      .catch(() => {});
  }
</script>
</body>
</html>
